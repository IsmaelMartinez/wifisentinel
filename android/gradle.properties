# JVM args for the Gradle daemon. Tuned for modest laptops; bump -Xmx if you
# hit OOM during AGP builds on large modules.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# AndroidX must be on for Compose / Material3.
android.useAndroidX=true

# Kotlin code style follows the Kotlin coding conventions (see
# https://kotlinlang.org/docs/coding-conventions.html).
kotlin.code.style=official

# Non-transitive R classes — smaller APK, faster builds.
android.nonTransitiveRClass=true
