name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install CLI dependencies
        run: npm ci

      - name: Typecheck CLI
        run: npm run typecheck

      - name: Build CLI
        run: npm run build

      - name: Smoke check CLI help
        run: |
          node dist/cli.js --help > /tmp/help.txt
          ! grep -E '\btv\b' /tmp/help.txt

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install CLI dependencies
        run: npm ci

      - name: Install dashboard dependencies
        run: cd dashboard && npm ci

      - name: Build dashboard
        run: cd dashboard && npx next build
